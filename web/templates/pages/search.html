{{ define "title" }}Search — PulseFit{{ end }}
{{ define "content" }}
<div class="p-4 md:p-8">
  <div class="sticky top-0 z-40 bg-black/80 backdrop-blur-md -mx-4 px-4 md:-mx-8 md:px-8 py-3 md:py-4 mb-6 md:mb-8 border-b border-white/5">
    <div class="relative max-w-sm">
      <span class="absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-black text-sm">🔍</span>
      <input type="text" placeholder="What do you want to train?" class="w-full bg-white text-black py-2.5 md:py-3 pl-10 md:pl-12 pr-10 rounded-full text-xs md:text-sm font-black placeholder:text-black/50 focus:outline-none uppercase italic" />
    </div>
  </div>
  <h2 class="text-xl md:text-2xl font-black italic uppercase mb-6 text-white">Browse all</h2>
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
    {{ range .Categories }}
    <div class="aspect-square rounded-2xl p-3 md:p-4 relative overflow-hidden cursor-pointer shadow-xl {{ .Color }} hover:scale-105 transition-transform">
      <h3 class="text-xl md:text-2xl font-black italic uppercase leading-none text-white">{{ .Name }}</h3>
      <img src="{{ .Image }}" alt="{{ .Name }}" class="absolute -right-4 -bottom-4 w-20 h-20 md:w-28 md:h-28 object-cover rotate-12 md:rotate-[25deg] shadow-2xl rounded-lg opacity-80" />
    </div>
    {{ end }}
  </div>
  <div class="mt-12 md:mt-16">
    <h2 class="text-xl md:text-2xl font-black italic uppercase mb-6 text-white">Recent Trainings</h2>
    <div class="space-y-2">
      {{ range .Recent }}
      <div class="flex items-center justify-between p-3 md:p-4 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer group transition-colors border border-white/5">
        <div class="flex items-center gap-3 md:gap-4">
          <div class="w-10 h-10 md:w-12 md:h-12 bg-pulse-volt/20 rounded-lg flex items-center justify-center text-pulse-volt">🔍</div>
          <span class="font-bold text-sm md:text-base text-white">{{ . }}</span>
        </div>
        <span class="text-white/20 group-hover:text-white transition-colors">›</span>
      </div>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
