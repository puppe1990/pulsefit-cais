{{ define "workout_sets" }}
<h3 class="text-sm font-black uppercase tracking-widest text-white/40 mb-4">Sets</h3>
{{ if .Sets }}
<div class="space-y-2 mb-6">
  {{ range .Sets }}
  <div class="flex items-center gap-4 text-sm text-white/80 py-2 border-b border-white/5">
    <span class="text-pulse-volt font-mono w-6">{{ .Position }}</span>
    <span>{{ .Weight }} kg</span>
    <span>× {{ .Reps }}</span>
    {{ if .Completed }}<span class="text-pulse-volt text-xs font-bold">DONE</span>{{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
<form
  hx-post="/workout/{{ .SessionID }}/set?ex={{ .ExerciseIndex }}"
  hx-target="#sets-panel"
  hx-swap="innerHTML"
  class="grid grid-cols-2 sm:grid-cols-3 gap-3 items-end"
>
  <input type="hidden" name="exercise_log_id" value="{{ .ExerciseLogID }}" />
  <div>
    <label class="text-[10px] uppercase text-white/40 font-bold">Weight</label>
    <input name="weight" type="number" step="0.5" min="0" class="w-full bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-white" placeholder="0" />
  </div>
  <div>
    <label class="text-[10px] uppercase text-white/40 font-bold">Reps</label>
    <input name="reps" type="number" min="0" class="w-full bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-white" placeholder="0" />
  </div>
  <div class="col-span-2 sm:col-span-1 flex sm:flex-col items-center sm:items-stretch justify-between sm:justify-start gap-3 sm:gap-2">
    <label class="flex items-center gap-2 text-xs text-white/60">
      <input type="checkbox" name="completed" value="1" class="accent-pulse-volt" /> Done
    </label>
    <button type="submit" class="bg-pulse-volt text-black font-black py-2.5 sm:py-2 px-6 sm:px-0 rounded-lg text-xs uppercase">Log set</button>
  </div>
</form>
{{ end }}
