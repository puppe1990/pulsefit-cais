<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <meta name="theme-color" content="#4f46e5" />
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-md text-center">
      <h1 class="text-2xl font-bold text-slate-800 mb-2">You are offline</h1>
      <p class="text-slate-600 mb-6">Reconnect to load the latest content from the server.</p>
      <button
        onclick="location.reload()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-xl transition"
      >
        Try again
      </button>
    </div>
  </body>
</html>
