root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  entrypoint = ["./tmp/main"]
  delay = 1000
  exclude_dir = ["tmp", "data", "bin", "node_modules"]
  include_ext = ["go", "html"]
  stop_on_error = true

[log]
  time = false
  main_only = true

[misc]
  clean_on_exit = true